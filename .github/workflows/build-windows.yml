name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "electron/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify FFmpeg
        shell: pwsh
        run: |
          $ffmpeg = Join-Path $PWD "node_modules/ffmpeg-static/ffmpeg.exe"
          if (-not (Test-Path $ffmpeg)) { throw "Bundled FFmpeg was not installed" }
          & $ffmpeg -version | Select-Object -First 1

      - name: Build Windows installer
        run: npm run dist:win

      - name: Verify relative renderer assets
        shell: pwsh
        run: |
          $html = Get-Content dist/index.html -Raw
          if ($html -match 'src="/assets/|href="/assets/') { throw "Absolute renderer asset path detected" }

      - name: Verify installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter "Vodie-Studio-Setup-*.exe" | Select-Object -First 1
          if (-not $installer) { throw "Windows installer was not generated" }
          Write-Output "Installer: $($installer.FullName)"
          Write-Output "Size: $($installer.Length) bytes"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Vodie-Studio-Windows-x64
          path: |
            release/Vodie-Studio-Setup-*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 30
